server:
  env_name: prod
  port: 8001

data:
  local_ingestion:
    enabled: false
    allow_ingest_from: ["*"]
  local_data_folder: local_data/production_rag

ui:
  enabled: true
  path: /
  default_mode: "RAG"

llm:
  mode: ollama
  prompt_style: llama3
  max_new_tokens: 512
  context_window: 4096
  temperature: 0.1

rag:
  similarity_top_k: 2
  rerank:
    enabled: false
    model: cross-encoder/ms-marco-MiniLM-L-2-v2
    top_n: 1

summarize:
  use_async: true

embedding:
  mode: ollama
  ingest_mode: simple
  embed_dim: 768

vectorstore:
  database: qdrant

nodestore:
  database: simple

qdrant:
  path: local_data/production_rag/qdrant

# ---- REQUIRED SECTIONS (do not remove) ----

llamacpp:
  llm_hf_repo_id: ""
  llm_hf_model_file: ""

huggingface:
  embedding_hf_model_name: nomic-ai/nomic-embed-text-v1.5
  access_token: ""
  trust_remote_code: true

sagemaker:
  llm_endpoint_name: ""
  embedding_endpoint_name: ""

openai:
  api_key: ""
  model: gpt-3.5-turbo
  embedding_api_key: ""

azopenai:
  api_key: ""
  azure_endpoint: ""
  embedding_deployment_name: ""
  llm_deployment_name: ""
  api_version: "2023-05-15"

gemini:
  api_key: ""
  model: models/gemini-pro
  embedding_model: models/embedding-001

# ---- OLLAMA CONFIGURATION ----

ollama:
  llm_model: gemma3:1b
  embedding_model: nomic-embed-text
  api_base: http://localhost:11434
  embedding_api_base: http://localhost:11434
  keep_alive: 5m
  request_timeout: 120.0
  autopull_models: true
